name: Deploy to Pages

# The published page is built from source on every push. The WASM is deliberately NOT
# committed: it is a build artifact, and a committed artifact goes stale the moment someone
# edits dsp.cpp and forgets to rebuild — the page would then run different DSP from the
# repository it claims to be.
#
# GitHub Pages serves over HTTPS with a real certificate, which is the whole point: browsers
# only grant getUserMedia in a secure context, so a self-signed cert means fighting a warning
# on every phone. Here there is nothing to fight.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  EMSDK_VERSION: 3.1.74

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned, not `latest`. `latest` once silently shipped a page that had never been
      # run: newer emscripten stopped attaching HEAPF32/HEAPU8 to the Module, the local
      # toolchain still did, and the artifact that got published was not the artifact that
      # got tested. A moving toolchain means the thing you verify is not the thing you ship.
      - name: Install emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git ~/emsdk
          cd ~/emsdk
          ./emsdk install ${{ env.EMSDK_VERSION }}
          ./emsdk activate ${{ env.EMSDK_VERSION }}
          echo "$HOME/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Build WASM
        run: |
          emcc --version | head -1
          make wasm
          ls -l web/uchat.js web/uchat.wasm

      # The DSP is the thing worth publishing correctly, so prove it still works before
      # shipping it. This runs the same suite as a developer's `make selftest`.
      # Runs against the artifact THIS job just built, not a local one. That is the whole
      # point: the failure being guarded here only appears on toolchains that do not
      # auto-export the heap views, so a local pass is meaningless.
      - name: Check the built WASM exports everything the page uses
        run: node tools/check-wasm.js web/uchat.js web/uchat.wasm

      - name: Run DSP self-test
        run: |
          make selftest
          ./selftest

      - name: Assemble site
        run: |
          mkdir -p _site
          cp web/mesh.html _site/index.html
          # sw.js caches ./mesh.html and ./capture-worklet.js by those names; if either
          # 404s, addModule() throws on load and the SW install fails outright.
          cp web/mesh.html _site/mesh.html
          cp web/capture-worklet.js _site/
          cp web/uchat.js web/uchat.wasm _site/
          cp web/sw.js web/manifest.json web/icon.svg _site/
          cp README.md BENCHMARKS.md _site/
          ls -l _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

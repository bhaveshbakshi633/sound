<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0e1116"/>
  <!-- eight bars, one per FSK tone, heights tracing the measured over-air response -->
  <g fill="#2ea043">
    <rect x="120" y="236" width="24" height="40" rx="12"/>
    <rect x="164" y="216" width="24" height="80" rx="12"/>
    <rect x="208" y="180" width="24" height="152" rx="12"/>
    <rect x="252" y="140" width="24" height="232" rx="12"/>
    <rect x="296" y="168" width="24" height="176" rx="12"/>
    <rect x="340" y="208" width="24" height="96" rx="12"/>
    <rect x="384" y="232" width="24" height="48" rx="12"/>
  </g>
  <!-- radiating arcs: the signal leaving, with nothing carrying it but air -->
  <g fill="none" stroke="#1f6feb" stroke-width="14" stroke-linecap="round" opacity="0.9">
    <path d="M 92 200 A 72 72 0 0 0 92 312"/>
    <path d="M 60 168 A 120 120 0 0 0 60 344"/>
  </g>
  <g fill="none" stroke="#1f6feb" stroke-width="14" stroke-linecap="round" opacity="0.9">
    <path d="M 436 200 A 72 72 0 0 1 436 312"/>
    <path d="M 468 168 A 120 120 0 0 1 468 344"/>
  </g>
</svg>
